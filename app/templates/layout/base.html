<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discount Shop{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    {% include 'layout/header.html' %}

    <main class="main-content container py-4">
        {% block content %}{% endblock %}
    </main>

    {% include 'layout/footer.html' %}

    <!-- LOGIN REQUIRED MODAL -->
<div class="modal fade" id="loginRequiredModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4 rounded-4">

      <div class="d-flex justify-content-end">
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <h3 class="text-center mb-3">Bạn cần đăng nhập</h3>

      <p class="text-center text-muted mb-4">
        Vui lòng đăng nhập hoặc đăng ký để tiếp tục
      </p>

      <div class="d-grid gap-2">
        <a href="{{ url_for('login') }}" class="btn btn-dark rounded-pill">
          Đăng nhập
        </a>

        <a href="{{ url_for('register') }}" class="btn btn-outline-dark rounded-pill">
          Đăng ký
        </a>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
