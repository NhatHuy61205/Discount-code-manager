{% extends 'layout/base.html' %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">

                <h3 class="text-center mb-4 fw-bold">Đăng ký tài khoản</h3>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Tên</label>
                        <input type="text" name="name"
                               value="{{ form_data.get('name', '') }}"
                               class="form-control rounded-pill {% if error and 'Tên' in error %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username"
                               value="{{ form_data.get('username', '') }}"
                               class="form-control rounded-pill {% if error and 'Tên đăng nhập' in error %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email"
                               value="{{ form_data.get('email', '') }}"
                               class="form-control rounded-pill {% if error and 'Email' in error %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" name="phone"
                               value="{{ form_data.get('phone', '') }}"
                               class="form-control rounded-pill {% if error and 'Số điện thoại' in error %}is-invalid{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" name="address"
                               value="{{ form_data.get('address', '') }}"
                               class="form-control rounded-pill {% if error and 'địa chỉ' in error|lower %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password"
                               class="form-control rounded-pill {% if error and 'Mật khẩu' in error %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nhập lại mật khẩu</label>
                        <input type="password" name="confirm"
                               class="form-control rounded-pill {% if error and 'khớp' in error %}is-invalid{% endif %}"
                               required>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <div class="d-grid">
                        <button class="btn btn-danger rounded-pill">
                            Đăng ký
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small>
                        Đã có tài khoản?
                        <a href="{{ url_for('login') }}" class="text-danger">Đăng nhập</a>
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
